name: AO3 Scraper

on:
  schedule:
    # 10-14 sessions per day at staggered times (UTC)
    - cron: '10 0 * * *'    # ~00:10 AM UTC
    - cron: '20 1 * * *'    # ~1:20 AM UTC
    - cron: '30 2 * * *'    # ~2:30 AM UTC
    - cron: '40 3 * * *'    # ~3:40 AM UTC
    - cron: '10 5 * * *'    # ~5:10 AM UTC
    - cron: '25 7 * * *'    # ~7:25 AM UTC
    - cron: '40 9 * * *'    # ~9:40 AM UTC
    - cron: '10 11 * * *'   # ~11:10 AM UTC
    - cron: '25 13 * * *'   # ~1:25 PM UTC
    - cron: '40 15 * * *'   # ~3:40 PM UTC
    - cron: '10 17 * * *'   # ~5:10 PM UTC
    - cron: '25 19 * * *'   # ~7:25 PM UTC
    - cron: '40 21 * * *'   # ~9:40 PM UTC
  workflow_dispatch: {}       # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330      # 5h30m hard limit (buffer before 6h GH limit)
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Random start delay (0-30 min jitter)
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Adding ${DELAY}s random start delay for jitter..."
          sleep $DELAY

      - name: Run AO3 scraper
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          npx tsx src/services/scrapers/ao3/scrapingOrchestrator.ts \
            --runner-id=github-actions \
            --max-duration=17400
        # 17400s = 4h50m — leaves ~40min for git operations + jitter

      - name: Commit scraped data
        run: |
          git config user.name "FanNexus Bot"
          git config user.email "bot@fannexus.local"
          
          # Add all data files
          git add data/ || true
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            STORIES=$(wc -l < data/scraping/scraped_ids.txt 2>/dev/null || echo "0")
            git commit -m "🤖 Scraping session $(date -u +%Y-%m-%dT%H:%M:%SZ) — ${STORIES} total stories"
            
            # Pull with rebase to handle concurrent pushes from local scraper
            git pull --rebase origin main || git pull --rebase origin master || true
            git push
            
            echo "✅ Scraped data committed and pushed."
          fi
